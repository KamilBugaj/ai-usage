name: Bug report
description: Something in the app is broken or behaves unexpectedly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown in the installer file name and in the tray menu.
      placeholder: v0.0.7
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Affected provider tile
      options:
        - Claude.ai
        - ChatGPT
        - GitHub Copilot
        - None / app-wide
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings
        2. ...
