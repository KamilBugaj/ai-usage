name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore KB.AI.Usage.slnx

      - name: Build
        run: dotnet build KB.AI.Usage.slnx -c Release --no-restore

      - name: Test
        run: dotnet test KB.AI.Usage.slnx -c Release --no-build --logger "console;verbosity=minimal"
