name: Prune release assets

# The release workflow prunes on every publish, but that alone can't enforce the
# age cap when no new release is cut. This daily run strips assets from releases
# past the 14-day cap (always keeping the 2 newest) independently of releases.
on:
  schedule:
    - cron: '17 4 * * *' # daily, 04:17 UTC
  workflow_dispatch:

jobs:
  prune:
    name: Prune old release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prune old release assets (keep 2 newest, 14-day cap)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: bash .github/scripts/prune-release-assets.sh
