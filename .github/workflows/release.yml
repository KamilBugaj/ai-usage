name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows ships the native libs beside the exe (selfExtractNative: false) so they
          # are not re-extracted to %TEMP%\.net on every launch (that dir grew unbounded,
          # ~18 MB per version, never cleaned). The installer recurses the publish dir, so the
          # loose DLLs are picked up. macOS keeps them embedded: make-app.sh copies only the
          # single-file exe into the .app bundle, so its native libs must travel inside it.
          # trimmed: Windows only. Trimming halves the payload but can break Avalonia/JSON at
          # runtime in platform-specific ways; it is verified on Windows (the primary target
          # and the machine that can be tested). macOS stays untrimmed until it can be run-tested.
          - os: windows-latest
            rid: win-x64
            selfExtractNative: 'false'
            trimmed: 'true'
          - os: macos-latest
            rid: osx-arm64
            selfExtractNative: 'true'
            trimmed: 'false'
          - os: macos-latest
            rid: osx-x64
            selfExtractNative: 'true'
            trimmed: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/AiUsage.App/AiUsage.App.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=${{ matrix.selfExtractNative }} \
            -p:PublishTrimmed=${{ matrix.trimmed }} \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/${{ matrix.rid }}

      # SkiaSharp/HarfBuzz ship ~100 MB of native .pdb debug symbols as NuGet
      # content; they are useless to end users and DebugType=none does not remove
      # them. Strip before packaging — this is the single biggest size win.
      - name: Strip debug symbols
        shell: bash
        run: find publish/${{ matrix.rid }} -name '*.pdb' -delete

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
          PUBLISH_DIR: ${{ github.workspace }}\publish\win-x64
          DIST_DIR: ${{ github.workspace }}\dist
        run: iscc packaging/windows/installer.iss

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          chmod +x packaging/macos/make-app.sh
          bash packaging/macos/make-app.sh ${{ matrix.rid }} "${{ steps.version.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.rid }}
          path: dist/

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: List dist
        run: ls -la dist/

      - name: Push README and assets to public repo
        env:
          TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/KamilBugaj/ai-usage-app-releases.git public-repo || true
          if [ ! -d public-repo/.git ]; then
            mkdir -p public-repo
            cd public-repo
            git init
            git remote add origin https://x-access-token:${TOKEN}@github.com/KamilBugaj/ai-usage-app-releases.git
            cd ..
          fi
          cp docs/templates/public-README.md public-repo/README.md
          mkdir -p public-repo/docs/screenshots
          cp docs/screenshots/app-preview.png public-repo/docs/screenshots/app-preview.png
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/
          git diff --staged --quiet || git commit -m "docs: update README for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: KamilBugaj/ai-usage-app-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Asset retention on the public releases repo (keeps the release entry + tag
      # for history; strips only the heavy download assets). Shared with the
      # scheduled prune-releases workflow.
      - name: Prune old release assets (keep 2 newest, 14-day cap)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: bash .github/scripts/prune-release-assets.sh
