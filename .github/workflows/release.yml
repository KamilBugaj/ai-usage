name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/AiUsage.App/AiUsage.App.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=false \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/${{ matrix.rid }}

      # SkiaSharp/HarfBuzz ship ~100 MB of native .pdb debug symbols as NuGet
      # content; they are useless to end users and DebugType=none does not remove
      # them. Strip before packaging — this is the single biggest size win.
      - name: Strip debug symbols
        shell: bash
        run: find publish/${{ matrix.rid }} -name '*.pdb' -delete

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
          PUBLISH_DIR: ${{ github.workspace }}\publish\win-x64
          DIST_DIR: ${{ github.workspace }}\dist
        run: iscc packaging/windows/installer.iss

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          chmod +x packaging/macos/make-app.sh
          bash packaging/macos/make-app.sh ${{ matrix.rid }} "${{ steps.version.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.rid }}
          path: dist/

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: List dist
        run: ls -la dist/

      - name: Push README and assets to public repo
        env:
          TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/KamilBugaj/ai-usage-app-releases.git public-repo || true
          if [ ! -d public-repo/.git ]; then
            mkdir -p public-repo
            cd public-repo
            git init
            git remote add origin https://x-access-token:${TOKEN}@github.com/KamilBugaj/ai-usage-app-releases.git
            cd ..
          fi
          cp docs/templates/public-README.md public-repo/README.md
          mkdir -p public-repo/docs/screenshots
          cp docs/screenshots/app-preview.png public-repo/docs/screenshots/app-preview.png
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/
          git diff --staged --quiet || git commit -m "docs: update README for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: KamilBugaj/ai-usage-app-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Asset retention on the public releases repo. The release entry and its tag
      # are always kept (history stays visible on the Releases page); only the
      # heavy download assets are pruned. Keep assets on the newest release always
      # and on the 2nd-newest while it is <= 14 days old; strip assets from
      # everything else (3rd onward, or past the 14-day cap).
      - name: Prune old release assets (keep 2 newest, 14-day cap)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          REPO=KamilBugaj/ai-usage-app-releases
          NOW=$(date -u +%s)
          MAX_AGE=$((14 * 24 * 3600))
          gh release list --repo "$REPO" --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | to_entries[] | "\(.key) \(.value.tagName) \(.value.createdAt)"' \
          | while read -r idx tag created; do
              age=$(( NOW - $(date -u -d "$created" +%s) ))
              if [ "$idx" -eq 0 ]; then
                echo "keep assets (latest): $tag"
              elif [ "$idx" -eq 1 ] && [ "$age" -le "$MAX_AGE" ]; then
                echo "keep assets (2nd newest, ${age}s old): $tag"
              else
                echo "strip assets: $tag (idx=$idx, age=${age}s)"
                gh release view "$tag" --repo "$REPO" --json assets \
                  --jq '.assets[].name' \
                | while read -r asset; do
                    [ -n "$asset" ] || continue
                    echo "  delete asset: $asset"
                    gh release delete-asset "$tag" "$asset" --repo "$REPO" --yes
                  done
              fi
            done
